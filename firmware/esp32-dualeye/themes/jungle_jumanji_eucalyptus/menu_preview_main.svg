<svg xmlns="http://www.w3.org/2000/svg" width="1619" height="971" viewBox="0 0 1619 971" role="img" aria-label="Approved KoalaByte Blue main menu preview">
  <defs>
    <linearGradient id="row" x1="0" x2="1"><stop offset="0" stop-color="#07140b"/><stop offset="1" stop-color="#020807"/></linearGradient>
    <filter id="glow"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#84ff34" flood-opacity="0.65"/></filter>
    <style>
      .title { font-family: Impact, Copperplate, 'Arial Black', serif; font-weight:900; letter-spacing:5px; paint-order:stroke fill; }
      .label { font-family:'Arial Black', Impact, sans-serif; font-weight:900; fill:#e8f2d4; }
      .desc { font-family:'Arial', sans-serif; font-weight:700; fill:#b9c8a8; }
      .num { font-family:'Arial Black', Impact, sans-serif; font-weight:900; fill:#e8f2d4; }
      .sel { fill:#84ff34; }
    </style>
  </defs>
  <rect width="1619" height="971" fill="#020807"/>
  <rect x="24" y="24" width="1571" height="923" rx="28" fill="none" stroke="#624622" stroke-width="5"/>
  <rect x="34" y="34" width="1551" height="903" rx="22" fill="none" stroke="#4f8b33" stroke-width="2"/>
  <g opacity="0.9" fill="#315f32" stroke="#82c75e" stroke-width="2">
    <ellipse cx="83" cy="55" rx="52" ry="14" transform="rotate(-25 83 55)"/><ellipse cx="1480" cy="55" rx="52" ry="14" transform="rotate(25 1480 55)"/>
    <ellipse cx="72" cy="780" rx="65" ry="16" transform="rotate(28 72 780)"/><ellipse cx="1540" cy="780" rx="65" ry="16" transform="rotate(-28 1540 780)"/>
  </g>
  <text x="790" y="112" text-anchor="middle" class="title" font-size="98" fill="#cca85c" stroke="#2d1b0a" stroke-width="8">KOALABYTE</text>
  <text x="1165" y="112" text-anchor="middle" class="title" font-size="98" fill="#1c8aff" stroke="#07152b" stroke-width="8">BLUE</text>
  <text x="810" y="190" text-anchor="middle" class="title" font-size="54" fill="#1c8aff" stroke="#07152b" stroke-width="4">MAIN MENU</text>
  <text x="810" y="242" text-anchor="middle" class="desc" font-size="34" fill="#e8f2d4">Jungle / Jumanji Eucalyptus Theme</text>

  <g transform="translate(125,300)">
    <rect x="0" y="0" width="1368" height="92" rx="24" fill="url(#row)" stroke="#84ff34" stroke-width="4" filter="url(#glow)"/>
    <text x="160" y="59" class="num sel" font-size="48">01</text><text x="270" y="59" class="label" font-size="44">Eucalyptus Mode</text><text x="910" y="42" class="desc" font-size="27">Always-on passive Bluetooth</text><text x="910" y="74" class="desc" font-size="27">scanner &amp; logger</text>
    <rect x="0" y="105" width="1368" height="82" rx="20" fill="url(#row)" stroke="#4f8b33" stroke-width="2"/>
    <text x="160" y="158" class="num" font-size="42">02</text><text x="270" y="158" class="label" font-size="39">AI Companion</text><text x="910" y="141" class="desc" font-size="27">Voice prompts, banter,</text><text x="910" y="173" class="desc" font-size="27">XP leveling</text>
    <rect x="0" y="210" width="1368" height="82" rx="20" fill="url(#row)" stroke="#4f8b33" stroke-width="2"/>
    <text x="160" y="263" class="num" font-size="42">03</text><text x="270" y="263" class="label" font-size="39">BlueZ Wrapped Menu Tools</text><text x="910" y="246" class="desc" font-size="27">Scan, capture, reports,</text><text x="910" y="278" class="desc" font-size="27">adapter status</text>
    <rect x="0" y="315" width="1368" height="82" rx="20" fill="url(#row)" stroke="#4f8b33" stroke-width="2"/>
    <text x="160" y="368" class="num" font-size="42">04</text><text x="270" y="368" class="label" font-size="39">Koala Kan Kommander</text><text x="910" y="351" class="desc" font-size="27">CAN interface: inventory,</text><text x="910" y="383" class="desc" font-size="27">status, passive listen</text>
    <rect x="0" y="420" width="1368" height="82" rx="20" fill="url(#row)" stroke="#4f8b33" stroke-width="2"/>
    <text x="160" y="473" class="num" font-size="42">05</text><text x="270" y="473" class="label" font-size="39">Koala Mode Switcher</text><text x="910" y="456" class="desc" font-size="27">Select KoalaByte Lab /</text><text x="910" y="488" class="desc" font-size="27">Koala Konnect</text>
    <rect x="0" y="525" width="1368" height="82" rx="20" fill="url(#row)" stroke="#4f8b33" stroke-width="2"/>
    <text x="160" y="578" class="num" font-size="42">06</text><text x="270" y="578" class="label" font-size="39">Settings</text><text x="910" y="561" class="desc" font-size="27">Theme, colors, display,</text><text x="910" y="593" class="desc" font-size="27">companion</text>
  </g>
  <rect x="216" y="880" width="1187" height="54" rx="20" fill="#050403" stroke="#6b4b25" stroke-width="3"/>
  <text x="810" y="917" text-anchor="middle" class="label" font-size="30"><tspan fill="#84ff34">B1</tspan> Menu   |   <tspan fill="#84ff34">B2</tspan> Back   |   <tspan fill="#84ff34">B3</tspan> Select   |   <tspan fill="#84ff34">B4</tspan> Next   |   <tspan fill="#84ff34">B5</tspan> Up   |   <tspan fill="#84ff34">B6</tspan> Down</text>
</svg>
