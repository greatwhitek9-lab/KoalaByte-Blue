<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-label="Approved KoalaByte Blue jungle boot splash">
  <defs>
    <linearGradient id="bark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f2d98a"/>
      <stop offset="0.45" stop-color="#9b7442"/>
      <stop offset="1" stop-color="#d9c08a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="4" flood-color="#000" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#84ff34" flood-opacity="0.45"/>
    </filter>
    <filter id="blueGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#1c8aff" flood-opacity="0.9"/>
    </filter>
    <radialGradient id="leftEye" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffe5ff"/>
      <stop offset="0.45" stop-color="#e63cff"/>
      <stop offset="1" stop-color="#24002e"/>
    </radialGradient>
    <radialGradient id="rightEye" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f1ffd6"/>
      <stop offset="0.45" stop-color="#84ff34"/>
      <stop offset="1" stop-color="#061b00"/>
    </radialGradient>
    <style>
      .stone-title { font-family: Impact, Copperplate, 'Rockwell Extra Bold', 'Arial Black', serif; font-weight: 900; letter-spacing: 8px; paint-order: stroke fill; stroke: #2b1a0a; stroke-width: 12px; filter: url(#shadow); }
      .blue-title { font-family: Impact, Copperplate, 'Rockwell Extra Bold', 'Arial Black', serif; font-weight: 900; letter-spacing: 14px; paint-order: stroke fill; stroke: #07152b; stroke-width: 12px; filter: url(#blueGlow); }
      .branch { stroke: #6b4b25; stroke-width: 8; stroke-linecap: round; fill: none; }
      .leaf { fill: #315f32; stroke: #82c75e; stroke-width: 2; opacity: 0.95; }
      .subtitle { font-family: 'Arial Black', Impact, sans-serif; font-weight: 900; letter-spacing: 7px; fill: #e8f2d4; }
    </style>
  </defs>

  <rect width="1672" height="941" fill="#000"/>
  <rect x="24" y="24" width="1624" height="893" rx="22" fill="#020403" stroke="#6b4b25" stroke-width="5"/>
  <rect x="34" y="34" width="1604" height="873" rx="18" fill="none" stroke="#346b2f" stroke-width="2"/>

  <g opacity="0.95">
    <path class="branch" d="M35 160 C170 70 310 110 440 54"/>
