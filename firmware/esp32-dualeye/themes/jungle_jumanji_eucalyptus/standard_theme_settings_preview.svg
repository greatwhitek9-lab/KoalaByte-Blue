<svg xmlns="http://www.w3.org/2000/svg" width="1619" height="971" viewBox="0 0 1619 971" role="img" aria-label="Approved KoalaByte Blue standard theme settings preview">
  <defs>
    <filter id="blueGlow"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#36a3ff" flood-opacity="0.8"/></filter>
    <style>
      .title { font-family: Impact, Copperplate, 'Arial Black', serif; font-weight:900; letter-spacing:6px; paint-order:stroke fill; stroke:#061329; stroke-width:6px; fill:#1c8aff; }
      .label { font-family:'Arial Black', Impact, sans-serif; font-weight:900; fill:#f1f6ff; }
      .value { font-family:'Arial Black', Impact, sans-serif; font-weight:900; fill:#84ff34; }
      .sub { font-family:'Arial', sans-serif; font-weight:700; fill:#e8f2d4; }
    </style>
  </defs>
  <rect width="1619" height="971" fill="#020807"/>
  <rect x="24" y="24" width="1571" height="923" rx="28" fill="none" stroke="#624622" stroke-width="5"/>
  <rect x="34" y="34" width="1551" height="903" rx="22" fill="none" stroke="#315f32" stroke-width="3"/>
  <g opacity="0.9" fill="#315f32" stroke="#82c75e" stroke-width="2">
    <ellipse cx="90" cy="70" rx="68" ry="17" transform="rotate(-25 90 70)"/><ellipse cx="1490" cy="70" rx="68" ry="17" transform="rotate(25 1490 70)"/>
    <ellipse cx="90" cy="830" rx="74" ry="18" transform="rotate(28 90 830)"/><ellipse cx="1490" cy="830" rx="74" ry="18" transform="rotate(-28 1490 830)"/>
  </g>
  <text x="810" y="130" text-anchor="middle" class="title" font-size="86">STANDARD THEME SETTINGS</text>
  <text x="810" y="195" text-anchor="middle" class="sub" font-size="34">User editable background • font • textbox colors</text>

  <g transform="translate(180,250)">
    <rect x="0" y="0" width="1260" height="80" rx="18" fill="#061015" stroke="#36a3ff" stroke-width="3" filter="url(#blueGlow)"/>
    <rect x="28" y="17" width="82" height="46" fill="#000000" stroke="#f1f6ff" stroke-width="2"/><text x="150" y="53" class="label" font-size="38">BACKGROUND</text><text x="1010" y="53" class="value" font-size="34">#000000</text>
    <rect x="0" y="102" width="1260" height="80" rx="18" fill="#061015" stroke="#36a3ff" stroke-width="3" filter="url(#blueGlow)"/>
    <rect x="28" y="119" width="82" height="46" fill="#1b1b1b" stroke="#f1f6ff" stroke-width="2"/><text x="150" y="155" class="label" font-size="38">FONT FAMILY</text><text x="820" y="155" class="value" font-size="30">Arial Black / Impact fallback</text>
    <rect x="0" y="204" width="1260" height="80" rx="18" fill="#061015" stroke="#36a3ff" stroke-width="3" filter="url(#blueGlow)"/>
    <rect x="28" y="221" width="82" height="46" fill="#111820" stroke="#f1f6ff" stroke-width="2"/><text x="150" y="257" class="label" font-size="38">TEXTBOX COLOR</text><text x="1010" y="257" class="value" font-size="34">#111820</text>
    <rect x="0" y="306" width="1260" height="80" rx="18" fill="#061015" stroke="#36a3ff" stroke-width="3" filter="url(#blueGlow)"/>
    <rect x="28" y="323" width="82" height="46" fill="#36a3ff" stroke="#f1f6ff" stroke-width="2"/><text x="150" y="359" class="label" font-size="38">TEXTBOX BORDER</text><text x="1010" y="359" class="value" font-size="34">#36A3FF</text>
    <rect x="0" y="408" width="1260" height="80" rx="18" fill="#061015" stroke="#36a3ff" stroke-width="3" filter="url(#blueGlow)"/>
    <rect x="28" y="425" width="82" height="46" fill="#f1f6ff" stroke="#f1f6ff" stroke-width="2"/><text x="150" y="461" class="label" font-size="38">TEXT COLOR</text><text x="1010" y="461" class="value" font-size="34">#F1F6FF</text>
    <rect x="0" y="510" width="1260" height="80" rx="18" fill="#061015" stroke="#36a3ff" stroke-width="3" filter="url(#blueGlow)"/>
    <rect x="28" y="527" width="82" height="46" fill="#1c8aff" stroke="#f1f6ff" stroke-width="2"/><text x="150" y="563" class="label" font-size="38">SELECTED ITEM</text><text x="1010" y="563" class="value" font-size="34">#1C8AFF</text>
  </g>
  <text x="810" y="875" text-anchor="middle" class="title" font-size="58">KOALABYTE</text>
  <text x="810" y="925" text-anchor="middle" class="value" font-size="30">BUILT WILD. HACK RESPONSIBLY.</text>
  <circle cx="1415" cy="850" r="64" fill="#020304" stroke="#233023" stroke-width="3"/>
  <circle cx="1394" cy="840" r="14" fill="#e63cff"/><circle cx="1438" cy="840" r="14" fill="#84ff34"/>
</svg>
