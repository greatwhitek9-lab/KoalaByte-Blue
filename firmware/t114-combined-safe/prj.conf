# KoalaByte Blue Heltec T114 combined-safe firmware
# Primary role: Heltec onboard nRF52840 is the canonical passive BLE node.
# Secondary BLE nodes remain ESP32-S3 DualEye and Raspberry Pi BlueZ on the Pi side.

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=2048
CONFIG_PRINTK=y
CONFIG_LOG=n

# USB CDC serial JSON transport to the Raspberry Pi companion.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=n
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y

# Local BLE application mode. This is not HCI USB mode; it emits normalized JSON.
CONFIG_BT=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_CENTRAL=n
CONFIG_BT_PERIPHERAL=n
CONFIG_BT_DEVICE_NAME="KoalaByte-T114"

# Keep the firmware passive by default.
CONFIG_BT_SCAN_WITH_IDENTITY=n
