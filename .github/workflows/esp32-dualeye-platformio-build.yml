name: ESP32 DualEye PlatformIO Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/esp32-dualeye-platformio-build.yml"
      - "firmware/esp32-dualeye/**"
      - "scripts/flash_esp32.sh"
      - "scripts/configure_esp32s3_dualeye_2g4_antenna.sh"

jobs:
  esp32-dualeye-platformio-build:
    name: Run pio build for ESP32-S3 DualEye
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Build ESP32-S3 DualEye firmware
        run: pio run -d firmware/esp32-dualeye

      - name: Upload firmware build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: esp32-dualeye-platformio-build
          path: |
            firmware/esp32-dualeye/.pio/build/esp32s3_dualeye/firmware.*
            firmware/esp32-dualeye/.pio/build/esp32s3_dualeye/*.elf
            firmware/esp32-dualeye/.pio/build/esp32s3_dualeye/*.map
          if-no-files-found: ignore
