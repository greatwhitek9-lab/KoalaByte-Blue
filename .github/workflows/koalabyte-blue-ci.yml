name: KoalaByte Blue CI

on:
  push:
    branches:
      - Main
      - main
      - koalabyte-blue-v2-heltec-edition
  pull_request:
    branches:
      - Main
      - main
      - koalabyte-blue-v2-heltec-edition

jobs:
  pi-companion-readiness:
    name: Check Pi companion, installer, and readiness helpers
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pi companion dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r pi-companion/requirements.txt

      - name: Show checkout diagnostics
        run: |
          echo "HEAD=$(git rev-parse HEAD)"
          echo "branch=${GITHUB_REF_NAME}"
          echo "readiness_sha=$(git rev-parse HEAD:scripts/check_repo_readiness.py)"
          echo "deployability_sha=$(git rev-parse HEAD:scripts/check_deployability.sh)"
          echo "bootstrap_sha=$(git rev-parse HEAD:install.sh)"
          echo "install_pi_sha=$(git rev-parse HEAD:scripts/install_pi.sh)"
          echo "one_shot_sha=$(git rev-parse HEAD:scripts/install_koalabyte_one_shot.sh)"
          echo "field_readiness_sha=$(git rev-parse HEAD:scripts/check_field_readiness.py)"
          echo "prompt_ui_sha=$(git rev-parse HEAD:scripts/check_menu_prompt_ui.py)"
          echo "koala_kry_menu_sha=$(git rev-parse HEAD:scripts/check_koala_kry_menu.py)"
          echo "menu_catalog_sha=$(git rev-parse HEAD:pi-companion/koalablue/menu_catalog.py)"
          echo "doctor_sha=$(git rev-parse HEAD:scripts/koalabyte_doctor.py)"
          echo "udev_rules_sha=$(git rev-parse HEAD:udev/99-koalabyte-blue.rules)"
          echo "boot_services_sha=$(git rev-parse HEAD:scripts/install_koalabyte_boot_services.sh)"
          echo "logrotate_installer_sha=$(git rev-parse HEAD:scripts/install_koalabyte_logrotate.sh)"
          echo "version_handshake_sha=$(git rev-parse HEAD:scripts/check_koalabyte_version_handshake.py)"
          echo "status_server_sha=$(git rev-parse HEAD:scripts/run_koalabyte_status_server.py)"
          echo "release_workflow_sha=$(git rev-parse HEAD:.github/workflows/release-package.yml)"
          echo "production_readme_sha=$(git rev-parse HEAD:production/README.md)"
          echo "menu_display_sync_sha=$(git rev-parse HEAD:scripts/check_menu_display_sync.py)"
          echo "preflight_sha=$(git rev-parse HEAD:scripts/preflight_all_hardware.py)"
          echo "ollama_helper_sha=$(git rev-parse HEAD:scripts/setup_killerkoala_ollama.sh)"
          echo "bluez_helper_sha=$(git rev-parse HEAD:scripts/setup_bluez_gatttool.sh)"

      - name: Check shell helper syntax
        run: |
          bash -n install.sh
          bash -n scripts/check_deployability.sh
          bash -n scripts/install_koalabyte_one_shot.sh
          bash -n scripts/install_pi.sh
          bash -n scripts/flash_all_components.sh
          bash -n scripts/flash_esp32.sh
          bash -n scripts/flash_t114_when_plugged.sh
          bash -n scripts/flash_t114_combined_safe.sh
          bash -n scripts/build_t114_combined_safe.sh
          bash -n scripts/flash_heltec_mouth.sh
          bash -n scripts/preflight_all_hardware.sh
          bash -n scripts/setup_killerkoala_ollama.sh
          bash -n scripts/setup_bluez_gatttool.sh
          bash -n scripts/configure_koalabyte_external_antennas.sh
          bash -n scripts/setup_system_packages.sh
          bash -n scripts/setup_esp32_tools.sh
          bash -n scripts/setup_heltec_t114_tools.sh
          bash -n scripts/setup_nrf_tools.sh
          bash -n scripts/setup_nrf_connect_sdk_toolchain.sh
          bash -n scripts/koalabyte_doctor.sh
          bash -n scripts/install_koalabyte_udev_rules.sh
          bash -n scripts/install_koalabyte_boot_services.sh
          bash -n scripts/install_koalabyte_logrotate.sh
          bash -n scripts/koalabyte_safe_mode.sh
          bash -n scripts/export_koalabyte_logs.sh
          bash -n scripts/build_koalabyte_release_package.sh

      - name: Compile Python modules and scripts
        run: python -m compileall pi-companion scripts

      - name: Run repo readiness check
        run: python scripts/check_repo_readiness.py

      - name: Run full runtime dependency check
        run: PYTHONPATH=pi-companion python scripts/check_full_runtime_dependencies.py

      - name: Generate T114 protocol artifacts
        run: bash scripts/build_default_t114_protocol_artifacts.sh

      - name: Validate helper check-only modes
        run: |
          bash scripts/setup_wifi_first_boot.sh --check-only
          bash scripts/setup_system_packages.sh --check-only
          bash scripts/setup_esp32_tools.sh --check-only
          bash scripts/setup_heltec_t114_tools.sh --check-only
          bash scripts/setup_nrf_tools.sh --check-only
          bash scripts/setup_nrf_connect_sdk_toolchain.sh --check-only
          bash scripts/setup_killerkoala_ollama.sh --check-only
          bash scripts/setup_bluez_gatttool.sh --check-only
          bash scripts/flash_t114_when_plugged.sh --check-only
          bash scripts/configure_koalabyte_external_antennas.sh --check-only
          bash scripts/install_koalabyte_udev_rules.sh --check-only
          bash scripts/install_koalabyte_boot_services.sh --check-only
          bash scripts/install_koalabyte_logrotate.sh --check-only

      - name: Validate menu, prompt, field, and hardware readiness reports
        run: |
          PYTHONPATH=pi-companion python scripts/check_menu_actions.py
          PYTHONPATH=pi-companion python scripts/check_menu_theme_fit.py
          PYTHONPATH=pi-companion python scripts/check_menu_prompt_ui.py
          PYTHONPATH=pi-companion python scripts/check_koala_kry_menu.py
          PYTHONPATH=pi-companion python scripts/check_menu_display_sync.py
          PYTHONPATH=pi-companion python scripts/check_one_shot_controls.py
          PYTHONPATH=pi-companion python scripts/check_field_readiness.py
          PYTHONPATH=pi-companion python scripts/check_koalabyte_version_handshake.py
          PYTHONPATH=pi-companion python scripts/run_koalabyte_status_server.py --json
          bash scripts/koalabyte_doctor.sh --quick
          python scripts/preflight_all_hardware.py --profile heltec

      - name: Validate deployability and flashing dry-run gate
        run: bash scripts/check_deployability.sh

      - name: Validate one-shot dry run
        run: bash scripts/install_koalabyte_one_shot.sh --check-only

      - name: Validate release/log helpers
        run: |
          bash scripts/build_koalabyte_release_package.sh
          bash scripts/export_koalabyte_logs.sh
          test -f dist/KoalaByte-Blue-install-package.zip -o -f dist/KoalaByte-Blue-install-package.tar.gz
          test -d dist/KoalaByte-Blue/production
          test -d exports

  esp32-firmware-build:
    name: Build ESP32-S3 DualEye firmware
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Build ESP32 firmware
        run: pio run -d firmware/esp32-dualeye

      - name: Build default T114 protocol artifacts
        run: bash scripts/build_default_t114_protocol_artifacts.sh
