name: KoalaByte Blue CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  esp32-firmware-build:
    name: Build ESP32-S3 DualEye firmware
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Show checkout diagnostics
        run: |
          echo "HEAD=$(git rev-parse HEAD)"
          echo "readiness_sha=$(git rev-parse HEAD:scripts/check_repo_readiness.py)"
          echo "flash_all_sha=$(git rev-parse HEAD:scripts/flash_all_components.sh)"
          echo "preboot_sha=$(git rev-parse HEAD:scripts/run_preboot_mode_select.py)"
          echo "cache_helper_sha=$(git rev-parse HEAD:scripts/prepare_dongle_firmware_cache.sh)"
          echo "nrf_tools_sha=$(git rev-parse HEAD:scripts/setup_nrf_tools.sh)"
          echo "ncs_toolchain_sha=$(git rev-parse HEAD:scripts/setup_nrf_connect_sdk_toolchain.sh)"
          echo "esp32_tools_sha=$(git rev-parse HEAD:scripts/setup_esp32_tools.sh)"
          echo "system_packages_sha=$(git rev-parse HEAD:scripts/setup_system_packages.sh)"

      - name: Run repo readiness check
        run: python scripts/check_repo_readiness.py

      - name: Check helper shell syntax
        run: |
          bash -n scripts/flash_all_components.sh
          bash -n scripts/flash_esp32.sh
          bash -n scripts/build_firmware_all.sh
          bash -n scripts/install_pi.sh
          bash -n scripts/koalabyte_blue_boot.sh
          bash -n scripts/prepare_dongle_firmware_cache.sh
          bash -n scripts/setup_nrf_tools.sh
          bash -n scripts/setup_nrf_connect_sdk_toolchain.sh
          bash -n scripts/setup_esp32_tools.sh
          bash -n scripts/setup_system_packages.sh

      - name: Build ESP32 firmware
        run: pio run -d firmware/esp32-dualeye

  nrf-zephyr-source-check:
    name: Check nRF52840 Dongle Zephyr project wiring
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show checkout diagnostics
        run: |
          echo "HEAD=$(git rev-parse HEAD)"
          echo "readiness_sha=$(git rev-parse HEAD:scripts/check_repo_readiness.py)"
          echo "flash_all_sha=$(git rev-parse HEAD:scripts/flash_all_components.sh)"
          echo "preboot_sha=$(git rev-parse HEAD:scripts/run_preboot_mode_select.py)"
          echo "cache_helper_sha=$(git rev-parse HEAD:scripts/prepare_dongle_firmware_cache.sh)"
          echo "nrf_tools_sha=$(git rev-parse HEAD:scripts/setup_nrf_tools.sh)"
          echo "ncs_toolchain_sha=$(git rev-parse HEAD:scripts/setup_nrf_connect_sdk_toolchain.sh)"
          echo "esp32_tools_sha=$(git rev-parse HEAD:scripts/setup_esp32_tools.sh)"
          echo "system_packages_sha=$(git rev-parse HEAD:scripts/setup_system_packages.sh)"

      - name: Run repo readiness check
        run: python scripts/check_repo_readiness.py

      - name: Confirm nRF52840 Dongle Zephyr app and DFU helpers
        run: |
          test -f firmware/nrf52840-dongle-ear-tag-tx-lab/CMakeLists.txt
          test -f firmware/nrf52840-dongle-ear-tag-tx-lab/prj.conf
          test -f firmware/nrf52840-dongle-ear-tag-tx-lab/src/main.c
          test -f scripts/build_nrf52840_dongle_lab.sh
          test -f scripts/flash_nrf52840_dongle_lab_dfu.sh
          test -f scripts/flash_all_components.sh
          test -f scripts/setup_nrf_tools.sh
          test -f scripts/setup_nrf_connect_sdk_toolchain.sh
          test -f scripts/setup_esp32_tools.sh
          test -f scripts/setup_system_packages.sh
          test -f scripts/run_preboot_mode_select.py
          test -f scripts/koalabyte_blue_boot.sh
          test -f scripts/prepare_dongle_firmware_cache.sh
          test -f docs/INSTALL_DEPENDENCIES.md
          test -f pi-companion/koalablue/preboot_mode_selector.py
          grep -q 'find_package(Zephyr REQUIRED' firmware/nrf52840-dongle-ear-tag-tx-lab/CMakeLists.txt
          grep -q 'CONFIG_BT_DEVICE_NAME="KoalaByte Lab"' firmware/nrf52840-dongle-ear-tag-tx-lab/prj.conf
          grep -q 'bt_le_adv_start' firmware/nrf52840-dongle-ear-tag-tx-lab/src/main.c
          grep -q 'setup_nrf_tools.sh --west-only' scripts/build_nrf52840_dongle_lab.sh
          grep -q 'setup_nrf_connect_sdk_toolchain.sh' scripts/build_nrf52840_dongle_lab.sh
          grep -q 'setup_nrf_tools.sh --nrfutil-only' scripts/flash_nrf52840_dongle_lab_dfu.sh
          grep -q 'setup_nrf_tools.sh' scripts/flash_all_components.sh
          grep -q 'setup_nrf_connect_sdk_toolchain.sh' scripts/flash_all_components.sh
          grep -q 'setup_esp32_tools.sh' scripts/flash_esp32.sh
          grep -q 'setup_system_packages.sh' scripts/install_pi.sh
          grep -q 'koala_konnect' pi-companion/koalablue/preboot_mode_selector.py
          grep -q 'prepare-cache' pi-companion/koalablue/koala_mode_switcher.py

  pi-companion-python-check:
    name: Check Pi companion Python
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pi companion dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r pi-companion/requirements.txt

      - name: Show checkout diagnostics
        run: |
          echo "HEAD=$(git rev-parse HEAD)"
          echo "readiness_sha=$(git rev-parse HEAD:scripts/check_repo_readiness.py)"
          echo "flash_all_sha=$(git rev-parse HEAD:scripts/flash_all_components.sh)"
          echo "preboot_sha=$(git rev-parse HEAD:scripts/run_preboot_mode_select.py)"
          echo "cache_helper_sha=$(git rev-parse HEAD:scripts/prepare_dongle_firmware_cache.sh)"
          echo "nrf_tools_sha=$(git rev-parse HEAD:scripts/setup_nrf_tools.sh)"
          echo "ncs_toolchain_sha=$(git rev-parse HEAD:scripts/setup_nrf_connect_sdk_toolchain.sh)"
          echo "esp32_tools_sha=$(git rev-parse HEAD:scripts/setup_esp32_tools.sh)"
          echo "system_packages_sha=$(git rev-parse HEAD:scripts/setup_system_packages.sh)"

      - name: Compile Python modules and scripts
        run: python -m compileall pi-companion scripts

      - name: Run repo readiness check
        run: python scripts/check_repo_readiness.py

      - name: Validate system package check-only mode
        run: bash scripts/setup_system_packages.sh --check-only

      - name: Validate ESP32 tool setup check-only mode
        run: bash scripts/setup_esp32_tools.sh --check-only

      - name: Validate nRF tool setup check-only mode
        run: bash scripts/setup_nrf_tools.sh --check-only

      - name: Validate NCS toolchain check-only mode
        run: bash scripts/setup_nrf_connect_sdk_toolchain.sh --check-only

      - name: Validate pre-boot selector noninteractive mode
        run: PYTHONPATH=pi-companion python scripts/run_preboot_mode_select.py --noninteractive --no-apply

      - name: Validate cache status command
        run: PYTHONPATH=pi-companion python scripts/run_koala_mode_switcher.py cache-status

      - name: Validate all-component helper check-only mode
        run: bash scripts/flash_all_components.sh --check-only
