<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-label="KoalaByte Blue Heltec and ESP32 antenna wiring">
  <rect width="1400" height="850" fill="#07130d"/>
  <rect x="40" y="40" width="1320" height="770" rx="24" fill="#0d1f14" stroke="#62ff8f" stroke-width="4"/>
  <text x="700" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#d9c58a">KOALABYTE BLUE RevA25</text>
  <text x="700" y="140" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#67c7ff">Heltec T114 + ESP32-S3 DualEye Antenna Paths</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#e8ffe8">
    <rect x="90" y="210" width="390" height="170" rx="18" fill="#12281a" stroke="#62ff8f" stroke-width="3"/>
    <text x="285" y="252" text-anchor="middle" font-size="26" font-weight="700">Heltec Mesh Node T114</text>
    <text x="285" y="292" text-anchor="middle">SX1262 LoRa connector</text>
    <text x="285" y="326" text-anchor="middle">Use region-matched antenna</text>
    <text x="285" y="358" text-anchor="middle">915 MHz US / 868 MHz where legal</text>

    <rect x="920" y="210" width="390" height="170" rx="18" fill="#12281a" stroke="#ffdf7a" stroke-width="3"/>
    <text x="1115" y="252" text-anchor="middle" font-size="26" font-weight="700">LoRa Antenna</text>
    <text x="1115" y="292" text-anchor="middle">SMA/RP-SMA bulkhead if used</text>
    <text x="1115" y="326" text-anchor="middle">via short IPEX/U.FL pigtail</text>
    <text x="1115" y="358" text-anchor="middle">Do not use 2.4 GHz antenna here</text>

    <line x1="480" y1="295" x2="920" y2="295" stroke="#ffdf7a" stroke-width="6" marker-end="url(#arrow-yellow)"/>
    <text x="700" y="275" text-anchor="middle" fill="#ffdf7a">LoRa coax path</text>

    <rect x="90" y="440" width="390" height="145" rx="18" fill="#12281a" stroke="#62ff8f" stroke-width="3"/>
    <text x="285" y="482" text-anchor="middle" font-size="24" font-weight="700">Heltec T114 2.4 GHz</text>
    <text x="285" y="520" text-anchor="middle">Only if connector is exposed</text>
    <text x="285" y="552" text-anchor="middle">Follow vendor selector path</text>

    <rect x="920" y="440" width="390" height="145" rx="18" fill="#12281a" stroke="#67c7ff" stroke-width="3"/>
    <text x="1115" y="482" text-anchor="middle" font-size="24" font-weight="700">2.4 GHz BLE/Wi-Fi Antenna</text>
    <text x="1115" y="520" text-anchor="middle">SMA/RP-SMA bulkhead if used</text>
    <text x="1115" y="552" text-anchor="middle">via short IPEX/U.FL pigtail</text>

    <line x1="480" y1="512" x2="920" y2="512" stroke="#67c7ff" stroke-width="6" marker-end="url(#arrow-blue)"/>
    <text x="700" y="492" text-anchor="middle" fill="#67c7ff">optional Heltec 2.4 GHz coax path</text>

    <rect x="90" y="640" width="390" height="125" rx="18" fill="#12281a" stroke="#62ff8f" stroke-width="3"/>
    <text x="285" y="682" text-anchor="middle" font-size="24" font-weight="700">ESP32-S3 DualEye</text>
    <text x="285" y="720" text-anchor="middle">2.4 GHz / IPEX1-U.FL-MHF1</text>

    <rect x="920" y="640" width="390" height="125" rx="18" fill="#12281a" stroke="#67c7ff" stroke-width="3"/>
    <text x="1115" y="682" text-anchor="middle" font-size="24" font-weight="700">ESP32 2.4 GHz Antenna</text>
    <text x="1115" y="720" text-anchor="middle">Wi-Fi/Bluetooth antenna path</text>

    <line x1="480" y1="702" x2="920" y2="702" stroke="#67c7ff" stroke-width="6" marker-end="url(#arrow-blue)"/>
    <text x="700" y="682" text-anchor="middle" fill="#67c7ff">ESP32 coax path</text>
  </g>

  <text x="700" y="805" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#e8ffe8">Keep LoRa and 2.4 GHz paths labeled, strain-relieved, separated from USB power-pack wiring, and away from speaker magnets.</text>

  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#67c7ff"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ffdf7a"/>
    </marker>
  </defs>
</svg>
