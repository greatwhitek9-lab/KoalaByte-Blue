<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1254 1254" role="img" aria-labelledby="title desc">
  <title id="title">KoalaByte Blue code signature</title>
  <desc id="desc">Neon cyan terminal-style koala head drawn with dashed code-like vector marks.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="43%" r="76%">
      <stop offset="0%" stop-color="#142326"/>
      <stop offset="72%" stop-color="#0b1114"/>
      <stop offset="100%" stop-color="#05080a"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.24  0 0 0 0 0.93  0 0 0 0 1  0 0 0 0.65 0" result="cyanGlow"/>
      <feMerge>
        <feMergeNode in="cyanGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1254" height="1254" fill="url(#bg)"/>
  <g opacity="0.08" stroke="#57f7ff" stroke-width="1">
    <path d="M0 96H1254M0 192H1254M0 288H1254M0 384H1254M0 480H1254M0 576H1254M0 672H1254M0 768H1254M0 864H1254M0 960H1254M0 1056H1254"/>
  </g>

  <g filter="url(#glow)" fill="none" stroke="#59f4ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer ears -->
    <path stroke-dasharray="38 24 10 22" d="M420 371 C350 245 176 210 88 348 C14 464 42 638 152 727 C207 772 280 795 340 763"/>
    <path stroke-dasharray="38 24 10 22" d="M834 371 C904 245 1078 210 1166 348 C1240 464 1212 638 1102 727 C1047 772 974 795 914 763"/>

    <!-- inner ear folds -->
    <path opacity="0.9" stroke-dasharray="30 22" d="M334 343 C254 315 164 375 141 485"/>
    <path opacity="0.75" stroke-dasharray="18 24" d="M290 431 C223 455 190 515 198 589"/>
    <path opacity="0.75" stroke-dasharray="18 24" d="M292 590 C245 621 230 671 253 715"/>
    <path opacity="0.9" stroke-dasharray="30 22" d="M920 343 C1000 315 1090 375 1113 485"/>
    <path opacity="0.75" stroke-dasharray="18 24" d="M964 431 C1031 455 1064 515 1056 589"/>
    <path opacity="0.75" stroke-dasharray="18 24" d="M962 590 C1009 621 1024 671 1001 715"/>

    <!-- head and cheeks -->
    <path stroke-dasharray="42 27 12 24" d="M408 388 C472 315 560 353 627 372 C694 353 782 315 846 388 C922 475 963 619 920 760 C882 884 754 965 627 978 C500 965 372 884 334 760 C291 619 332 475 408 388"/>
    <path opacity="0.9" stroke-dasharray="22 22" d="M494 323 C530 286 575 286 607 320"/>
    <path opacity="0.9" stroke-dasharray="22 22" d="M647 320 C679 286 724 286 760 323"/>

    <!-- eyes -->
    <path stroke-dasharray="30 23" d="M415 612 C428 568 474 545 518 559"/>
    <path stroke-dasharray="30 23" d="M839 612 C826 568 780 545 736 559"/>
    <circle cx="465" cy="617" r="7" fill="#59f4ff" stroke="none"/>
    <circle cx="789" cy="617" r="7" fill="#59f4ff" stroke="none"/>
    <path opacity="0.95" stroke-dasharray="28 22" d="M422 684 C455 704 505 705 536 678"/>
    <path opacity="0.95" stroke-dasharray="28 22" d="M718 678 C749 705 799 704 832 684"/>

    <!-- nose bridge and nose -->
    <path opacity="0.85" stroke-dasharray="20 22" d="M583 448 C610 435 644 435 671 448"/>
    <path stroke-dasharray="38 22" d="M586 580 C586 535 668 535 668 580 L693 735 C693 793 561 793 561 735 Z"/>
    <path opacity="0.8" stroke-dasharray="18 22" d="M627 589 L627 763"/>

    <!-- muzzle and mouth -->
    <path stroke-dasharray="32 24" d="M518 783 C548 854 706 854 736 783"/>
    <path stroke-dasharray="24 22" d="M627 793 C627 837 590 860 547 865"/>
    <path stroke-dasharray="24 22" d="M627 793 C627 837 664 860 707 865"/>
    <path opacity="0.92" stroke-dasharray="30 24" d="M522 911 C579 945 675 945 732 911"/>

    <!-- cheek dots/code specks -->
    <g fill="#59f4ff" stroke="none" opacity="0.85">
      <circle cx="344" cy="637" r="4"/><circle cx="369" cy="704" r="4"/><circle cx="397" cy="772" r="4"/>
      <circle cx="910" cy="637" r="4"/><circle cx="885" cy="704" r="4"/><circle cx="857" cy="772" r="4"/>
      <circle cx="548" cy="958" r="4"/><circle cx="604" cy="980" r="4"/><circle cx="650" cy="980" r="4"/><circle cx="706" cy="958" r="4"/>
    </g>

    <!-- terminal underline -->
    <path stroke-dasharray="18 13" stroke-width="7" d="M60 1176H1194"/>
    <path opacity="0.45" stroke-dasharray="18 13" stroke-width="5" d="M60 1190H1194"/>
  </g>
</svg>
