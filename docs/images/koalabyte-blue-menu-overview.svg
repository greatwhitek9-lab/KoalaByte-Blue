<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">KoalaByte Blue PORKCHOP-style main menu overview</title>
  <desc id="desc">Chunky yellow and green KoalaByte Blue main menu showing Eucalyptus Mode and Boomerang descriptions.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="78%">
      <stop offset="0" stop-color="#0f3b20"/>
      <stop offset="0.48" stop-color="#06170d"/>
      <stop offset="1" stop-color="#020706"/>
    </radialGradient>
    <linearGradient id="pill" x1="0" x2="1">
      <stop offset="0" stop-color="#f7e462"/>
      <stop offset="1" stop-color="#c8ff59"/>
    </linearGradient>
    <linearGradient id="selected" x1="0" x2="1">
      <stop offset="0" stop-color="#ccff55"/>
      <stop offset="1" stop-color="#f7e45e"/>
    </linearGradient>
    <filter id="greenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title{font-family:&quot;Cooper Black&quot;,&quot;Arial Rounded MT Bold&quot;,&quot;DejaVu Sans&quot;,sans-serif;font-size:88px;font-weight:900;fill:#ffd63e;stroke:#164c1d;stroke-width:7px;paint-order:stroke;letter-spacing:2px}
      .subtitle{font-family:&quot;Cooper Black&quot;,&quot;Arial Rounded MT Bold&quot;,&quot;DejaVu Sans&quot;,sans-serif;font-size:30px;font-weight:900;fill:#ffb131;letter-spacing:5px}
      .group{font-family:&quot;Cooper Black&quot;,&quot;Arial Rounded MT Bold&quot;,&quot;DejaVu Sans&quot;,sans-serif;font-size:29px;font-weight:900;fill:#b8ff6b;letter-spacing:1px}
      .label{font-family:&quot;Cooper Black&quot;,&quot;Arial Rounded MT Bold&quot;,&quot;DejaVu Sans&quot;,sans-serif;font-size:30px;font-weight:900;fill:#073018;stroke:#ecf0a2;stroke-width:1.2px;paint-order:stroke}
      .desc{font-family:&quot;DejaVu Sans&quot;,sans-serif;font-size:19px;font-weight:800;fill:#063014}
      .small{font-family:&quot;DejaVu Sans Mono&quot;,monospace;font-size:18px;font-weight:800;fill:#b8ff6b}
      .branch{fill:none;stroke:#5a3f1e;stroke-width:17;stroke-linecap:round}
      .twig{fill:none;stroke:#b88436;stroke-width:4;stroke-linecap:round}
      .leaf{fill:#47bc53;stroke:#b8ff6b;stroke-width:2}
      .panel{fill:#06170d;stroke:#ffb131;stroke-width:4}
    </style>
  </defs>
  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <g opacity="0.24">
    <path d="M0 150 H1200 M0 300 H1200 M0 450 H1200 M0 600 H1200" stroke="#215a31" stroke-width="2"/>
    <path d="M150 0 V760 M300 0 V760 M450 0 V760 M600 0 V760 M750 0 V760 M900 0 V760 M1050 0 V760" stroke="#215a31" stroke-width="2"/>
  </g>
  <path class="branch" d="M72 694 C30 520 44 254 121 63"/>
  <path class="branch" d="M1128 694 C1170 520 1156 254 1079 63"/>
  <path class="twig" d="M78 185 C140 150 174 134 228 88"/>
  <path class="twig" d="M1124 204 C1055 162 1024 128 960 82"/>
  <g opacity="0.98">
    <ellipse class="leaf" cx="105" cy="135" rx="16" ry="39" transform="rotate(-35 105 135)"/><ellipse class="leaf" cx="159" cy="115" rx="15" ry="34" transform="rotate(45 159 115)"/><ellipse class="leaf" cx="82" cy="280" rx="15" ry="38" transform="rotate(28 82 280)"/><ellipse class="leaf" cx="114" cy="422" rx="14" ry="35" transform="rotate(-42 114 422)"/><ellipse class="leaf" cx="96" cy="610" rx="18" ry="42" transform="rotate(52 96 610)"/>
    <ellipse class="leaf" cx="1095" cy="135" rx="16" ry="39" transform="rotate(35 1095 135)"/><ellipse class="leaf" cx="1041" cy="115" rx="15" ry="34" transform="rotate(-45 1041 115)"/><ellipse class="leaf" cx="1118" cy="280" rx="15" ry="38" transform="rotate(-28 1118 280)"/><ellipse class="leaf" cx="1086" cy="422" rx="14" ry="35" transform="rotate(42 1086 422)"/><ellipse class="leaf" cx="1104" cy="610" rx="18" ry="42" transform="rotate(-52 1104 610)"/>
  </g>
  <text x="600" y="96" text-anchor="middle" class="title">KOALABYTE BLUE</text>
  <text x="600" y="143" text-anchor="middle" class="subtitle">MAIN MENU</text>
  <rect x="170" y="170" width="860" height="496" rx="34" class="panel"/>
  <rect x="292" y="196" width="616" height="58" rx="29" fill="#0c3c1c" stroke="#ffb131" stroke-width="5"/>
  <text x="600" y="234" text-anchor="middle" class="group">BLUETOOTH TOOLS</text>

  <rect x="238" y="280" width="724" height="72" rx="36" fill="url(#selected)" stroke="#53ff68" stroke-width="5" filter="url(#greenGlow)"/>
  <text x="286" y="309" class="label">09. EUCALYPTUS MODE</text>
  <text x="286" y="335" class="desc">Koalagotchi BLE canopy screen — KillerKoala eats passive Bluetooth leaves</text>

  <rect x="238" y="366" width="724" height="62" rx="31" fill="url(#pill)" stroke="#237d2d" stroke-width="4"/>
  <text x="286" y="407" class="label">10. KOALA KAPTURE</text>

  <rect x="238" y="442" width="724" height="62" rx="31" fill="url(#pill)" stroke="#237d2d" stroke-width="4"/>
  <text x="286" y="483" class="label">19. THAT’S NOT A KNIFE</text>

  <rect x="238" y="518" width="724" height="72" rx="36" fill="#f4db5d" stroke="#ffb131" stroke-width="5"/>
  <text x="286" y="547" class="label">24. BOOMERANG</text>
  <text x="286" y="573" class="desc">Camera-awareness logbook — records manual public observations and XP</text>

  <rect x="238" y="608" width="724" height="38" rx="19" fill="#072216" stroke="#b8ff6b" stroke-width="2"/>
  <text x="600" y="633" text-anchor="middle" class="small">B1 MENU   B2 BACK   B3 SELECT   B4 NEXT   B5 UP   B6 DOWN</text>
</svg>
